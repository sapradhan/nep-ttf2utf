'name' : Unicode Fix
'v' : 1.0.0
'post-rules' : !!pairs
#auto correct  
  - '्ा': ''  

  - 'ँ+': 'ँ'
  - 'ं+': 'ं'
  - 'े+': 'े'
  - 'ै+': 'ै'
  - 'ु+': 'ु'
  - 'ू+': 'ू'
  - 'ृ+': 'ृ'
  - 'ा+': 'ा'
  - '^ः': ':'
  - 'ेा': 'ाे'
  - 'ैा': 'ाै'
  - 'ाे': 'ो'
  - 'ाै': 'ौ'

  - 'अो': 'ओ'
  - 'अौ': 'औ'
  - 'अा': 'आ'
  - 'एे': 'ऐ'
  - 'र्इ': 'ई'

  - '्ा': ''  # 
  - '(त्र|त्त)([^उभप]+?)m': '\1m\2'  # shift m just after त्र त्त 
  - 'त्रm': 'क्र'
  - 'त्तm': 'क्त'
  - '([^उभप]+?)m': 'm\1'  # shift m just after उ भ प separated from त्र त्त to avoid false match for फ्र 
  - 'उm': 'ऊ'
  - 'भm': 'झ'
  - 'पm': 'फ'

'char-map' : 
  '1': '१'
  '2': '२'
  '3': '३'
  '4': '४'
  '5': '५'
  '6': '६'
  '7': '७'
  '8': '८'
  '9': '९'
  '0': '०'

  '¥': 'ऱ्'
  '“': 'ँ'

